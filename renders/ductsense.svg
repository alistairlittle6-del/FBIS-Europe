<?xml version="1.0" encoding="UTF-8"?>
<svg class="product-render" viewBox="0 0 1200 940" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="940" fill="#0a0a0a"/>

  <!-- Grid background -->
  <pattern id="ge_grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <line x1="40" y1="0" x2="40" y2="40" stroke="rgba(255,255,255,.012)" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="rgba(255,255,255,.012)" stroke-width="0.5"/>
  </pattern>
  

  <!-- Section labels -->
  <text x="280" y="45" text-anchor="middle" font-family="Outfit,sans-serif" font-size="22" fill="#ffffff" letter-spacing="3">SENSOR PLACEMENT</text>
  <text x="880" y="45" text-anchor="middle" font-family="Outfit,sans-serif" font-size="22" fill="#ffffff" letter-spacing="3">LIVE DATA OUTPUT</text>

  <!-- ═══ LEFT: DUCT CROSS-SECTION WITH SENSOR ═══ -->
  <g transform="translate(60, 80)">
    <!-- Duct section -->
    <rect x="0" y="0" width="440" height="500" rx="2" fill="#111314" stroke="#2a2c30" stroke-width="1.5"/>
    <line x1="5" y1="5" x2="435" y2="5" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
    <line x1="5" y1="495" x2="435" y2="495" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="5" y1="5" x2="5" y2="495" stroke="rgba(255,255,255,.04)" stroke-width="1"/>
    <line x1="435" y1="5" x2="435" y2="495" stroke="rgba(255,255,255,.04)" stroke-width="1"/>

    <!-- Duct walls (inner) -->
    <rect x="40" y="80" width="360" height="340" rx="2" fill="#161a1e" stroke="#2a2c30" stroke-width="1.2"/>
    <line x1="45" y1="85" x2="395" y2="85" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="45" y1="415" x2="395" y2="415" stroke="rgba(255,255,255,.03)" stroke-width="1"/>

    <!-- Grease layer on duct walls (variable thickness) -->
    <rect x="45" y="85" width="350" height="8" rx="1" fill="rgba(255,255,255,.05)"/>
    <rect x="45" y="407" width="350" height="8" rx="1" fill="rgba(255,255,255,.05)"/>
    <rect x="45" y="85" width="6" height="330" rx="1" fill="rgba(255,255,255,.04)"/>
    <rect x="389" y="85" width="6" height="330" rx="1" fill="rgba(255,255,255,.04)"/>

    <!-- ═══ DUCT-SENSE SENSOR MODULE ═══ -->
    <g transform="translate(180, 60)">
      <!-- Sensor housing (mounted on duct wall) -->
      <rect x="0" y="0" width="80" height="45" rx="3" fill="#1e2226" stroke="#4a4e52" stroke-width="1.5"/>
      <rect x="5" y="5" width="70" height="35" rx="2" fill="#161a1e" stroke="#3a3e42" stroke-width="1"/>
      <!-- Lens -->
      <circle cx="40" cy="22" r="10" fill="#111314" stroke="#4a4e52" stroke-width="1.5"/>
      <circle cx="40" cy="22" r="6" fill="#0e1012" stroke="#3a3e42" stroke-width="1"/>
      <!-- Lens pulse -->
      <circle cx="40" cy="22" r="4" fill="rgba(255,255,255,.08)">
        <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".12;.03;.12" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- Status LED -->
      <circle cx="65" cy="12" r="2" fill="#fff" opacity=".7">
        <animate attributeName="opacity" values=".7;.2;.7" dur="2.5s" repeatCount="indefinite"/>
      </circle>
      <!-- Label -->
      <text x="40" y="58" text-anchor="middle" font-family="Outfit,sans-serif" font-size="9" fill="#ffffff" letter-spacing="1.5">DUCT-SENSE SENSOR</text>
    </g>

    <!-- ═══ OPTICAL BEAM (scanning across duct) ═══ -->
    <line x1="220" y1="105" x2="220" y2="415" stroke="rgba(255,255,255,.06)" stroke-width="1.5" stroke-dasharray="6 4">
      <animate attributeName="x1" values="100;340;100" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="100;340;100" dur="6s" repeatCount="indefinite"/>
    </line>
    <!-- Beam spread -->
    <line x1="220" y1="105" x2="180" y2="415" stroke="rgba(255,255,255,.02)" stroke-width="1">
      <animate attributeName="x1" values="100;340;100" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="60;300;60" dur="6s" repeatCount="indefinite"/>
    </line>
    <line x1="220" y1="105" x2="260" y2="415" stroke="rgba(255,255,255,.02)" stroke-width="1">
      <animate attributeName="x1" values="100;340;100" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="x2" values="140;380;140" dur="6s" repeatCount="indefinite"/>
    </line>

    <!-- Scan line highlight -->
    <rect x="50" y="240" width="340" height="2" fill="rgba(255,255,255,.06)" rx="1">
      <animate attributeName="y" values="90;410;90" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".08;.03;.08" dur="6s" repeatCount="indefinite"/>
    </rect>

    <!-- Labels -->
    <text x="220" y="450" text-anchor="middle" font-family="Outfit,sans-serif" font-size="11" fill="#ffffff" letter-spacing="2">OPTICAL MEASUREMENT ZONE</text>
    <text x="220" y="30" text-anchor="middle" font-family="Outfit,sans-serif" font-size="12" fill="#ffffff" letter-spacing="2">DUCT INTERIOR</text>

    <!-- Sensor location callouts -->
    <text x="220" y="480" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff" letter-spacing="1.5">SENSOR LOCATIONS: CANOPY · VERTICAL RISER · HORIZONTAL RUN</text>

    <!-- Measurement annotations -->
    <!-- Left wall thickness -->
    <line x1="38" y1="200" x2="50" y2="200" stroke="rgba(255,255,255,.3)" stroke-width="0.8"/>
    <line x1="38" y1="200" x2="38" y2="300" stroke="rgba(255,255,255,.3)" stroke-width="0.8"/>
    <line x1="38" y1="300" x2="50" y2="300" stroke="rgba(255,255,255,.3)" stroke-width="0.8"/>
    <text x="35" y="255" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="8" fill="#ffffff" letter-spacing="1" transform="rotate(-90,35,255)">GREASE DEPTH</text>

    <!-- Algorithm label -->
    <rect x="80" y="500" width="280" height="30" rx="2" fill="rgba(255,255,255,.015)" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    <text x="220" y="520" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff" letter-spacing="2">PROPRIETARY FBIS ALGORITHM — PATENT PENDING</text>
  </g>

  <!-- ═══ RIGHT: LIVE DATA DASHBOARD ═══ -->
  <g transform="translate(580, 80)">
    <!-- Dashboard frame -->
    <rect x="0" y="0" width="560" height="720" rx="2" fill="#111314" stroke="#2a2c30" stroke-width="1.5"/>
    <line x1="5" y1="5" x2="555" y2="5" stroke="rgba(255,255,255,.04)" stroke-width="1"/>

    <!-- Header bar -->
    <rect x="5" y="5" width="550" height="35" rx="1" fill="#161a1e"/>
    <circle cx="20" cy="22" r="3" fill="#fff" opacity=".6">
      <animate attributeName="opacity" values=".6;.2;.6" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="30" y="27" font-family="DM Sans,sans-serif" font-size="14" fill="#ffffff" letter-spacing="1.5">DUCT-SENSE — LIVE</text>
    <text x="530" y="27" text-anchor="end" font-family="DM Sans,sans-serif" font-size="13" fill="#ffffff" letter-spacing="1">SITE: M&amp;B #0247</text>

    <!-- ═══ GREASE LEVEL CHART ═══ -->
    <g transform="translate(20, 60)">
      <text x="0" y="15" font-family="Outfit,sans-serif" font-size="16" fill="#ffffff" letter-spacing="2">GREASE ACCUMULATION — 90 DAYS</text>
      
      <!-- Chart area -->
      <rect x="0" y="25" width="520" height="180" rx="1" fill="#0e1012" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>
      
      <!-- Y axis labels -->
      <text x="8" y="45" text-anchor="end" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff">100%</text>
      <text x="8" y="90" text-anchor="end" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff">75%</text>
      <text x="8" y="135" text-anchor="end" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff">50%</text>
      <text x="8" y="180" text-anchor="end" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff">25%</text>
      
      <!-- Grid lines -->
      <line x1="0" y1="70" x2="520" y2="70" stroke="rgba(255,255,255,.03)" stroke-width="0.5"/>
      <line x1="0" y1="115" x2="520" y2="115" stroke="rgba(255,255,255,.03)" stroke-width="0.5"/>
      <line x1="0" y1="160" x2="520" y2="160" stroke="rgba(255,255,255,.03)" stroke-width="0.5"/>

      <!-- Threshold line -->
      <line x1="0" y1="70" x2="520" y2="70" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="6 4"/>
      <text x="490" y="68" text-anchor="end" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff" letter-spacing="1">CLEAN</text>
      <text x="490" y="78" text-anchor="end" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff" letter-spacing="1">THRESHOLD</text>

      <!-- Data line (rising grease over time, with cleaning drops) -->
      <polyline points="5,195 35,190 70,183 105,175 140,165 175,152 210,140 230,115 235,180 265,172 300,160 335,148 370,135 400,120 420,100 425,185 455,178 490,168 515,158" 
                stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linejoin="round" opacity=".6"/>
      <!-- Fill under line -->
      <polygon points="5,195 35,190 70,183 105,175 140,165 175,152 210,140 230,115 235,180 265,172 300,160 335,148 370,135 400,120 420,100 425,185 455,178 490,168 515,158 515,205 5,205" 
               fill="url(#ge_chartFill)" opacity=".15"/>

      <!-- Clean events -->
      <line x1="232" y1="30" x2="232" y2="200" stroke="rgba(255,255,255,.12)" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="232" y="215" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff">CLEAN 1</text>
      <line x1="422" y1="30" x2="422" y2="200" stroke="rgba(255,255,255,.12)" stroke-width="1" stroke-dasharray="3 3"/>
      <text x="422" y="215" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#ffffff">CLEAN 2</text>

      <!-- Animated current reading dot -->
      <circle cx="515" cy="158" r="4" fill="#ffffff" opacity=".3">
        <animate attributeName="r" values="3;6;3" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".4;.15;.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="515" cy="158" r="2" fill="#ffffff" opacity=".8"/>
    </g>

    <!-- ═══ CURRENT READINGS ═══ -->
    <g transform="translate(20, 310)">
      <text x="0" y="15" font-family="Outfit,sans-serif" font-size="16" fill="#ffffff" letter-spacing="2">CURRENT READINGS</text>
      
      <!-- Reading cards -->
      <rect x="0" y="25" width="165" height="80" rx="2" fill="#161a1e" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
      <text x="82" y="52" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#ffffff" letter-spacing="1.5">GREASE DEPTH</text>
      <text x="82" y="82" text-anchor="middle" font-family="Outfit,sans-serif" font-size="34" fill="#ffffff" letter-spacing="2" font-weight="700">2.4<tspan font-size="14">mm</tspan></text>

      <rect x="178" y="25" width="165" height="80" rx="2" fill="#161a1e" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
      <text x="260" y="52" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#ffffff" letter-spacing="1.5">DAYS TO THRESHOLD</text>
      <text x="260" y="82" text-anchor="middle" font-family="Outfit,sans-serif" font-size="34" fill="#ffffff" letter-spacing="2" font-weight="700">12</text>

      <rect x="356" y="25" width="165" height="80" rx="2" fill="#161a1e" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
      <text x="438" y="52" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#ffffff" letter-spacing="1.5">ACCUMULATION RATE</text>
      <text x="438" y="82" text-anchor="middle" font-family="Outfit,sans-serif" font-size="34" fill="#ffffff" letter-spacing="2" font-weight="700">0.2<tspan font-size="14">mm/d</tspan></text>
    </g>

    <!-- ═══ PREDICTIVE SCHEDULING ═══ -->
    <g transform="translate(20, 440)">
      <text x="0" y="15" font-family="Outfit,sans-serif" font-size="16" fill="#ffffff" letter-spacing="2">PREDICTIVE SCHEDULING</text>

      <!-- Timeline -->
      <rect x="0" y="30" width="520" height="60" rx="2" fill="#0e1012" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>
      
      <!-- Today marker -->
      <line x1="40" y1="30" x2="40" y2="90" stroke="rgba(255,255,255,.3)" stroke-width="1"/>
      <text x="40" y="105" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#ffffff">TODAY</text>
      <circle cx="40" cy="60" r="3" fill="#ffffff" opacity=".6"/>
      
      <!-- Predicted clean -->
      <line x1="340" y1="30" x2="340" y2="90" stroke="rgba(255,255,255,.15)" stroke-width="1" stroke-dasharray="4 3"/>
      <text x="340" y="105" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="10" fill="#ffffff">PREDICTED CLEAN</text>
      <circle cx="340" cy="60" r="3" fill="rgba(255,255,255,.3)" stroke="#ffffff" stroke-width="1"/>
      
      <!-- Progress bar -->
      <rect x="45" y="55" width="290" height="10" rx="2" fill="rgba(255,255,255,.03)"/>
      <rect x="45" y="55" width="180" height="10" rx="2" fill="rgba(255,255,255,.08)">
        <animate attributeName="width" values="170;190;170" dur="4s" repeatCount="indefinite"/>
      </rect>

      <!-- Auto-book note -->
      <text x="0" y="135" font-family="DM Sans,sans-serif" font-size="13" fill="#ffffff" letter-spacing="1.5">AUTO-BOOKS CLEANING WHEN THRESHOLD REACHED</text>
    </g>

    <!-- ═══ CONNECTED SYSTEMS ═══ -->
    <g transform="translate(20, 610)">
      <text x="0" y="15" font-family="Outfit,sans-serif" font-size="16" fill="#ffffff" letter-spacing="2">VALIDATES</text>
      
      <rect x="0" y="25" width="120" height="35" rx="2" fill="#161a1e" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
      <text x="60" y="47" text-anchor="middle" font-family="Outfit,sans-serif" font-size="12" fill="#ffffff" letter-spacing="1.5">PRO-VENT</text>
      
      <rect x="135" y="25" width="120" height="35" rx="2" fill="#161a1e" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
      <text x="195" y="47" text-anchor="middle" font-family="Outfit,sans-serif" font-size="12" fill="#ffffff" letter-spacing="1.5">VENTGUARD</text>

      <rect x="270" y="25" width="120" height="35" rx="2" fill="#161a1e" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
      <text x="330" y="47" text-anchor="middle" font-family="Outfit,sans-serif" font-size="12" fill="#ffffff" letter-spacing="1.5">KITCHEN-IQ</text>
    </g>
  </g>

  <!-- ═══ BRANDING ═══ -->
  <text x="600" y="860" text-anchor="middle" font-family="Outfit,sans-serif" font-size="48" fill="#ffffff" letter-spacing="12" font-weight="700">DUCT-SENSE</text>
  <text x="600" y="890" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="16" fill="#ffffff" letter-spacing="5">REAL-TIME GREASE MEASUREMENT</text>
  <text x="600" y="910" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="11" fill="#ffffff" letter-spacing="4">PATENT PENDING — PROPRIETARY FBIS ALGORITHM</text>

  <!-- ═══ DEFS ═══ -->
  <defs>
    <linearGradient id="ge_chartFill" x1="260" y1="100" x2="260" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
