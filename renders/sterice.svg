<?xml version="1.0" encoding="UTF-8"?>
<svg class="product-render"  viewBox="0 0 1200 910" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="910" fill="#0a0a0a"/>

  <!-- Grid background -->
  <pattern id="si_grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <line x1="40" y1="0" x2="40" y2="40" stroke="rgba(255,255,255,.015)" stroke-width="0.5"/>
    <line x1="0" y1="40" x2="40" y2="40" stroke="rgba(255,255,255,.015)" stroke-width="0.5"/>
  </pattern>
  

  <!-- Floor -->
  <line x1="0" y1="790" x2="1200" y2="790" stroke="rgba(255,255,255,.08)" stroke-width="1"/>
  

  <!-- Wall surface -->
  <rect x="80" y="30" width="440" height="760" fill="rgba(255,255,255,.015)"/>
  <line x1="80" y1="30" x2="80" y2="790" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
  <line x1="520" y1="30" x2="520" y2="790" stroke="rgba(255,255,255,.05)" stroke-width="1"/>

  <!-- ═══ STERI-ICE WALL UNIT ═══ -->
  <g transform="translate(190, 120)">
    <rect x="0" y="0" width="220" height="155" rx="2" fill="#161a1e" stroke="#3a3e42" stroke-width="1.5"/>
    <line x1="5" y1="5" x2="215" y2="5" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    <line x1="5" y1="150" x2="215" y2="150" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="5" y1="5" x2="5" y2="150" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    <line x1="215" y1="5" x2="215" y2="150" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    <!-- Screws -->
    <circle cx="14" cy="14" r="2.5" fill="#1e2226" stroke="#444" stroke-width="0.8"/>
    <circle cx="206" cy="14" r="2.5" fill="#1e2226" stroke="#444" stroke-width="0.8"/>
    <circle cx="14" cy="141" r="2.5" fill="#1e2226" stroke="#444" stroke-width="0.8"/>
    <circle cx="206" cy="141" r="2.5" fill="#1e2226" stroke="#444" stroke-width="0.8"/>
    <!-- Label -->
    <rect x="25" y="34" width="170" height="42" rx="2" fill="#1e2226" stroke="#444" stroke-width="1"/>
    <line x1="25" y1="34" x2="195" y2="34" stroke="rgba(255,255,255,.08)" stroke-width="0.5"/>
    <text x="110" y="56" text-anchor="middle" font-family="Outfit,sans-serif" font-size="14" font-weight="700" fill="#ffffff" letter-spacing="3">STERI-ICE</text>
    <text x="110" y="70" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="6" fill="#ffffff" letter-spacing="1.5">OZONE ICE MACHINE TREATMENT</text>
    <!-- Status LED (white/grey) -->
    <circle cx="55" cy="100" r="2.5" fill="#bbb" opacity=".7">
      <animate attributeName="opacity" values=".7;.2;.7" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <text x="64" y="103" font-family="DM Sans,sans-serif" font-size="6" fill="#ffffff" letter-spacing="1">ACTIVE</text>
    <!-- Vent slots -->
    <line x1="135" y1="95" x2="175" y2="95" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    <line x1="135" y1="100" x2="175" y2="100" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    <line x1="135" y1="105" x2="175" y2="105" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    <line x1="135" y1="110" x2="175" y2="110" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
    <!-- Mount brackets -->
    <rect x="-8" y="25" width="10" height="18" rx="1" fill="#1e2226" stroke="#3a3e42" stroke-width="1"/>
    <rect x="218" y="25" width="10" height="18" rx="1" fill="#1e2226" stroke="#3a3e42" stroke-width="1"/>
    <rect x="-8" y="110" width="10" height="18" rx="1" fill="#1e2226" stroke="#3a3e42" stroke-width="1"/>
    <rect x="218" y="110" width="10" height="18" rx="1" fill="#1e2226" stroke="#3a3e42" stroke-width="1"/>
    <!-- Pipe exit -->
    <circle cx="110" cy="155" r="4" fill="#161a1e" stroke="#444" stroke-width="1"/>
  </g>

  <!-- ═══ PIPE (from wall unit, along wall, into ice machine and down into water) ═══ -->
  <path d="M300 279 L300 395 Q300 408 313 408 L600 408 Q613 408 613 421 L613 480 L613 525" 
        stroke="#3a3e42" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M298 279 L298 393 Q298 406 311 406 L598 406 Q611 406 611 419 L611 525" 
        stroke="rgba(255,255,255,.06)" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Flow arrows -->
  <polygon points="300,330 295,322 305,322" fill="rgba(255,255,255,.2)"/>
  <polygon points="300,365 295,357 305,357" fill="rgba(255,255,255,.16)"/>
  <polygon points="450,408 442,403 442,413" fill="rgba(255,255,255,.15)"/>
  <polygon points="540,408 532,403 532,413" fill="rgba(255,255,255,.12)"/>
  <polygon points="613,460 608,452 618,452" fill="rgba(255,255,255,.12)"/>
  <!-- Pipe label -->
  <text x="325" y="330" font-family="Outfit,sans-serif" font-size="13" fill="#ffffff" letter-spacing="2">O₃ OZONE</text>

  <!-- ═══ ICE MACHINE ═══ -->
  <g transform="translate(545, 465)">
    <!-- Body -->
    <rect x="0" y="0" width="290" height="320" rx="2" fill="#161a1e" stroke="#3a3e42" stroke-width="1.5"/>
    <line x1="5" y1="5" x2="285" y2="5" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    <line x1="5" y1="315" x2="285" y2="315" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="5" y1="5" x2="5" y2="315" stroke="rgba(255,255,255,.05)" stroke-width="1"/>
    <line x1="285" y1="5" x2="285" y2="315" stroke="rgba(255,255,255,.05)" stroke-width="1"/>

    <!-- Top section -->
    <rect x="8" y="8" width="274" height="125" rx="2" fill="#131518" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>
    <rect x="15" y="14" width="260" height="8" rx="1" fill="#1e2226" stroke="rgba(255,255,255,.04)" stroke-width="0.5"/>
    <!-- Front panel -->
    <rect x="8" y="115" width="274" height="18" rx="1" fill="#1a1e22" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>
    <rect x="95" y="118" width="35" height="6" rx="1" fill="#222628" stroke="rgba(255,255,255,.06)" stroke-width="0.5"/>
    <rect x="160" y="118" width="35" height="6" rx="1" fill="#222628" stroke="rgba(255,255,255,.06)" stroke-width="0.5"/>

    <!-- ═══  ═══ -->
    <rect x="20" y="50" width="250" height="55" rx="2" fill="#111111" stroke="#3a3e42" stroke-width="1.2"/>
    <rect x="22" y="52" width="246" height="51" rx="1" fill="url(#si_waterG)"/>
    <!-- Ripples -->
    <path d="M32 68 Q65 63 100 68 Q135 73 170 68 Q205 63 240 68 Q255 72 262 68" stroke="rgba(255,255,255,.08)" stroke-width="0.8" fill="none"/>
    <path d="M32 78 Q60 73 90 78 Q125 83 160 78 Q195 73 230 78 Q250 82 262 78" stroke="rgba(255,255,255,.06)" stroke-width="0.8" fill="none"/>

    <!-- Pipe entering water bath from top -->
    <rect x="64" y="28" width="8" height="35" rx="1" fill="#3a3e42" stroke="#4a4e52" stroke-width="0.5"/>
    <!-- Pipe continues into water -->
    <rect x="64" y="52" width="8" height="40" rx="1" fill="#3a3e42" stroke="#4a4e52" stroke-width="0.5" opacity=".7"/>

    <!-- ═══ DIFFUSER (bottom of pipe in water) ═══ -->
    <rect x="52" y="88" width="32" height="8" rx="2" fill="#2a2e32" stroke="#4a4e52" stroke-width="1"/>
    <!-- Diffuser holes -->
    <circle cx="58" cy="92" r="1.2" fill="#1a1e22"/>
    <circle cx="64" cy="92" r="1.2" fill="#1a1e22"/>
    <circle cx="68" cy="92" r="1.2" fill="#1a1e22"/>
    <circle cx="73" cy="92" r="1.2" fill="#1a1e22"/>
    <circle cx="78" cy="92" r="1.2" fill="#1a1e22"/>
    <!-- "DIFFUSER" tiny label -->
    <text x="68" y="104" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="12" fill="#ffffff" letter-spacing="1">DIFFUSER</text>

    <!-- Ozone bubbles rising from diffuser -->
    <circle cx="56" cy="85" r="2" fill="rgba(255,255,255,.12)">
      <animate attributeName="cy" values="88;55;88" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".12;.02;.12" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="63" cy="82" r="2.5" fill="rgba(255,255,255,.1)">
      <animate attributeName="cy" values="88;53;88" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".1;.02;.1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="80" r="1.8" fill="rgba(255,255,255,.1)">
      <animate attributeName="cy" values="87;55;87" dur="2.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".1;.01;.1" dur="2.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="77" cy="84" r="2" fill="rgba(255,255,255,.09)">
      <animate attributeName="cy" values="88;54;88" dur="2.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".09;.01;.09" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="83" cy="82" r="1.5" fill="rgba(255,255,255,.08)">
      <animate attributeName="cy" values="86;56;86" dur="1.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="59" cy="78" r="1.5" fill="rgba(255,255,255,.07)">
      <animate attributeName="cy" values="86;58;86" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="74" cy="76" r="1.3" fill="rgba(255,255,255,.06)">
      <animate attributeName="cy" values="85;57;85" dur="2.8s" repeatCount="indefinite"/>
    </circle>

    <!-- Water bath label -->
    <text x="200" y="80" font-family="Outfit,sans-serif" font-size="18" fill="#ffffff" letter-spacing="2"></text>

    <!-- Divider -->
    <rect x="8" y="135" width="274" height="4" rx="1" fill="#1e2226" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>

    <!-- Bottom bin -->
    <rect x="8" y="141" width="274" height="170" rx="2" fill="#131518" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>
    <rect x="8" y="268" width="274" height="18" rx="1" fill="#1a1e22" stroke="rgba(255,255,255,.05)" stroke-width="0.5"/>
    <path d="M105 288 Q145 294 185 288" stroke="rgba(255,255,255,.06)" stroke-width="1" fill="none"/>
    
    <!-- Ice cubes -->
    <rect x="30" y="158" width="18" height="14" rx="2" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.07)" stroke-width="0.5"/>
    <rect x="55" y="154" width="18" height="14" rx="2" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.06)" stroke-width="0.5"/>
    <rect x="80" y="158" width="18" height="14" rx="2" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.07)" stroke-width="0.5"/>
    <rect x="105" y="152" width="18" height="14" rx="2" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.06)" stroke-width="0.5"/>
    <rect x="130" y="158" width="18" height="14" rx="2" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.07)" stroke-width="0.5"/>
    <rect x="155" y="154" width="18" height="14" rx="2" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.06)" stroke-width="0.5"/>
    <rect x="180" y="158" width="18" height="14" rx="2" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.07)" stroke-width="0.5"/>
    <rect x="205" y="152" width="18" height="14" rx="2" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.06)" stroke-width="0.5"/>
    <rect x="230" y="158" width="18" height="14" rx="2" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.07)" stroke-width="0.5"/>
    <rect x="42" y="176" width="18" height="14" rx="2" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.055)" stroke-width="0.5"/>
    <rect x="68" y="180" width="18" height="14" rx="2" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.065)" stroke-width="0.5"/>
    <rect x="94" y="176" width="18" height="14" rx="2" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.055)" stroke-width="0.5"/>
    <rect x="120" y="180" width="18" height="14" rx="2" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.065)" stroke-width="0.5"/>
    <rect x="146" y="176" width="18" height="14" rx="2" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.055)" stroke-width="0.5"/>
    <rect x="172" y="180" width="18" height="14" rx="2" fill="rgba(255,255,255,.03)" stroke="rgba(255,255,255,.065)" stroke-width="0.5"/>
    <rect x="198" y="176" width="18" height="14" rx="2" fill="rgba(255,255,255,.025)" stroke="rgba(255,255,255,.055)" stroke-width="0.5"/>

    <!-- Legs -->
    <rect x="22" y="313" width="12" height="18" rx="1" fill="#1e2226" stroke="#3a3e42" stroke-width="0.5"/>
    <rect x="256" y="313" width="12" height="18" rx="1" fill="#1e2226" stroke="#3a3e42" stroke-width="0.5"/>

    <!-- Label -->
    <text x="145" y="-10" text-anchor="middle" font-family="Outfit,sans-serif" font-size="26" fill="#ffffff" letter-spacing="4">ICE MACHINE</text>
  </g>

  <!-- ═══ OFF-GAS ANIMATION ═══ -->
  <clipPath id="si_clipGas"><rect x="554" y="474" width="272" height="120"/></clipPath>
  <g clip-path="url(#si_clipGas)">
    <rect x="558" y="478" width="265" height="110" rx="2" fill="url(#si_gasG)" opacity="0">
      <animate attributeName="opacity" values="0;.18;.18;0" dur="6s" repeatCount="indefinite"/>
    </rect>
    <circle cx="620" cy="530" r="2" fill="rgba(255,255,255,.07)">
      <animate attributeName="cy" values="540;485;540" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="r" values="2;5;2" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="660" cy="535" r="1.5" fill="rgba(255,255,255,.06)">
      <animate attributeName="cy" values="540;480;540" dur="3.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.5;4;1.5" dur="3.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="700" cy="528" r="1.8" fill="rgba(255,255,255,.06)">
      <animate attributeName="cy" values="538;488;538" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="r" values="1.8;4;1.8" dur="4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="532" r="1.5" fill="rgba(255,255,255,.05)">
      <animate attributeName="cy" values="538;482;538" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="780" cy="530" r="2" fill="rgba(255,255,255,.05)">
      <animate attributeName="cy" values="540;490;540" dur="4.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Bottom bin gas -->
  <clipPath id="si_clipGasBin"><rect x="554" y="608" width="272" height="158"/></clipPath>
  <g clip-path="url(#si_clipGasBin)">
    <rect x="558" y="612" width="265" height="150" rx="2" fill="url(#si_gasGBin)" opacity="0">
      <animate attributeName="opacity" values="0;.1;.1;0" dur="8s" begin="2s" repeatCount="indefinite"/>
    </rect>
    <circle cx="640" cy="670" r="2" fill="rgba(255,255,255,.04)">
      <animate attributeName="r" values="2;6;2" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="740" cy="690" r="1.5" fill="rgba(255,255,255,.03)">
      <animate attributeName="r" values="1.5;5;1.5" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══ STEP LABELS ═══ -->
  <line x1="175" y1="250" x2="120" y2="285" stroke="rgba(255,255,255,.15)" stroke-width="0.8" stroke-dasharray="4 3"/>
  <circle cx="120" cy="285" r="2" fill="rgba(255,255,255,.2)"/>
  <text x="30" y="305" font-family="Outfit,sans-serif" font-size="20" fill="#ffffff" letter-spacing="2">① OZONE GENERATED</text>

  <line x1="500" y1="395" x2="500" y2="375" stroke="rgba(255,255,255,.12)" stroke-width="0.8" stroke-dasharray="4 3"/>
  <circle cx="500" cy="375" r="2" fill="rgba(255,255,255,.15)"/>
  <text x="380" y="365" font-family="Outfit,sans-serif" font-size="20" fill="#ffffff" letter-spacing="2">② FEEDS TO </text>

  <text x="900" y="540" font-family="Outfit,sans-serif" font-size="20" fill="#ffffff" letter-spacing="2">③ O₃ SANITISES WATER</text>

  <text x="900" y="600" font-family="Outfit,sans-serif" font-size="20" fill="#ffffff" letter-spacing="2">④ OZONE TREATS</text>
  <text x="900" y="622" font-family="Outfit,sans-serif" font-size="20" fill="#ffffff" letter-spacing="2">    ALL INTERNAL SURFACES</text>

  <!-- ═══ BRANDING ═══ -->
  <text x="600" y="850" text-anchor="middle" font-family="Outfit,sans-serif" font-size="48" fill="#ffffff" letter-spacing="12" font-weight="700">STERI-ICE</text>
  <text x="600" y="880" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="16" fill="#ffffff" letter-spacing="5">OZONE ICE MACHINE TREATMENT</text>

  <defs>
    <linearGradient id="si_floorG" x1="600" y1="790" x2="600" y2="960" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="si_waterG" x1="0" y1="0" x2="0" y2="51" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="rgba(40,40,50,.2)"/>
      <stop offset="100%" stop-color="rgba(25,25,35,.35)"/>
    </linearGradient>
    <linearGradient id="si_gasG" x1="690" y1="540" x2="690" y2="478" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".15"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="si_gasGBin" cx="690" cy="690" r="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
