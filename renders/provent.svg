<?xml version="1.0" encoding="UTF-8"?>
<svg class="product-render"  viewBox="0 0 1200 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="1200" fill="#0a0a0a"/>

  <!-- Grid background -->

  

  <!-- Floor line -->
  <line x1="0" y1="920" x2="1200" y2="920" stroke="rgba(255,255,255,.06)" stroke-width="1"/>
  

  <!-- ═══ HORIZONTAL DUCTWORK (top) ═══ -->
  <rect x="320" y="300" width="740" height="130" rx="2" fill="#141618" stroke="#2a2c30" stroke-width="1.5"/>
  <line x1="325" y1="305" x2="325" y2="425" stroke="rgba(255,255,255,.025)" stroke-width="1"/>
  <line x1="1055" y1="305" x2="1055" y2="425" stroke="rgba(255,255,255,.025)" stroke-width="1"/>
  <line x1="325" y1="305" x2="1055" y2="305" stroke="rgba(255,255,255,.015)" stroke-width="1"/>
  <line x1="325" y1="425" x2="1055" y2="425" stroke="rgba(255,255,255,.015)" stroke-width="1"/>
  <!-- Continues -->
  <text x="960" y="460" font-family="Outfit,sans-serif" font-size="16" fill="#ffffff" letter-spacing="1.5">PROBIOTIC BEGINS</text>
  <text x="960" y="480" font-family="Outfit,sans-serif" font-size="16" fill="#ffffff" letter-spacing="1.5">DIGESTING GREASE</text>

  <!-- ═══ NOZZLE: Left wall of duct ═══ -->
  <g transform="translate(332, 365)">
    <rect x="-9" y="-9" width="18" height="18" rx="2.5" fill="#1e1e22" stroke="#444" stroke-width="1.2"/>
    <rect x="9" y="-3.5" width="9" height="7" rx="1.5" fill="#252528" stroke="#444" stroke-width="0.8"/>
    <circle cx="20" cy="0" r="2.5" fill="#1a1a1a" stroke="#444" stroke-width="0.6"/>
    <circle cx="-2" cy="-3.5" r="1.8" fill="#fff" opacity=".8">
      <animate attributeName="opacity" values=".8;.2;.8" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══ SPIGOTS ═══ -->
  <rect x="460" y="425" width="55" height="100" rx="2" fill="#141618" stroke="#2a2c30" stroke-width="1.5"/>
  <line x1="465" y1="430" x2="465" y2="520" stroke="rgba(255,255,255,.02)" stroke-width="1"/>
  <line x1="510" y1="430" x2="510" y2="520" stroke="rgba(255,255,255,.02)" stroke-width="1"/>

  <rect x="670" y="425" width="55" height="100" rx="2" fill="#141618" stroke="#2a2c30" stroke-width="1.5"/>
  <line x1="675" y1="430" x2="675" y2="520" stroke="rgba(255,255,255,.02)" stroke-width="1"/>
  <line x1="720" y1="430" x2="720" y2="520" stroke="rgba(255,255,255,.02)" stroke-width="1"/>

  <rect x="880" y="425" width="55" height="100" rx="2" fill="#141618" stroke="#2a2c30" stroke-width="1.5"/>
  <line x1="885" y1="430" x2="885" y2="520" stroke="rgba(255,255,255,.02)" stroke-width="1"/>
  <line x1="930" y1="430" x2="930" y2="520" stroke="rgba(255,255,255,.02)" stroke-width="1"/>

  <!-- ═══ EXTRACTION HOOD CANOPY (wall-mounted, well above floor) ═══ -->
  <path d="M320 660 L320 580 L390 520 L980 520 L1050 580 L1050 660 Z" 
        fill="#141618" stroke="#2a2c30" stroke-width="1.5"/>
  <path d="M326 655 L326 584 L394 526 L976 526 L1044 584 L1044 655" 
        stroke="rgba(255,255,255,.025)" stroke-width="1" fill="none"/>
  <!-- Hood lip -->
  <rect x="312" y="656" width="746" height="9" rx="1" fill="#1a1c20" stroke="#2a2c30" stroke-width="1"/>
  <!-- Filters -->
  <rect x="400" y="638" width="110" height="10" rx="2" fill="rgba(255,255,255,.015)" stroke="rgba(255,255,255,.035)" stroke-width="0.5"/>
  <rect x="530" y="638" width="110" height="10" rx="2" fill="rgba(255,255,255,.015)" stroke="rgba(255,255,255,.035)" stroke-width="0.5"/>
  <rect x="660" y="638" width="110" height="10" rx="2" fill="rgba(255,255,255,.015)" stroke="rgba(255,255,255,.035)" stroke-width="0.5"/>
  <rect x="790" y="638" width="110" height="10" rx="2" fill="rgba(255,255,255,.015)" stroke="rgba(255,255,255,.035)" stroke-width="0.5"/>
  <rect x="920" y="638" width="100" height="10" rx="2" fill="rgba(255,255,255,.015)" stroke="rgba(255,255,255,.035)" stroke-width="0.5"/>
  <text x="685" y="685" text-anchor="middle" font-family="Outfit,sans-serif" font-size="17" fill="#ffffff" letter-spacing="4">EXTRACTION HOOD</text>

  <!-- ═══ NOZZLE: Left wall of canopy ═══ -->
  <g transform="translate(332, 580)">
    <rect x="-9" y="-9" width="18" height="18" rx="2.5" fill="#1e1e22" stroke="#444" stroke-width="1.2"/>
    <rect x="9" y="-3.5" width="9" height="7" rx="1.5" fill="#252528" stroke="#444" stroke-width="0.8"/>
    <circle cx="20" cy="0" r="2.5" fill="#1a1a1a" stroke="#444" stroke-width="0.6"/>
    <circle cx="-2" cy="-3.5" r="1.8" fill="#fff" opacity=".8">
      <animate attributeName="opacity" values=".8;.2;.8" dur="2.5s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- ═══ NOZZLE LABELS ═══ -->
  <g>
    <text x="60" y="400" font-family="Outfit,sans-serif" font-size="16" fill="#ffffff" letter-spacing="1.5">ULTRASONIC NOZZLES</text>
    <text x="60" y="420" font-family="Outfit,sans-serif" font-size="16" fill="#ffffff" letter-spacing="1.5">PRODUCE FOG</text>
    <!-- Arrow to duct nozzle -->
    <line x1="155" y1="400" x2="310" y2="375" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
    <polygon points="315,372 305,370 308,379" fill="rgba(255,255,255,.4)"/>
    <!-- Arrow to canopy nozzle -->
    <line x1="155" y1="420" x2="310" y2="580" stroke="rgba(255,255,255,.4)" stroke-width="1"/>
    <polygon points="315,583 305,575 308,585" fill="rgba(255,255,255,.4)"/>
  </g>

  <!-- ═══ PRO-VENT CABINET (on the floor, left of hood) ═══ -->
  <g transform="translate(30, 700)">
    <!-- Cabinet body -->
    <rect x="0" y="0" width="170" height="218" rx="2" fill="#141618" stroke="#2a2c30" stroke-width="1.5"/>
    <!-- Top edge -->
    <rect x="0" y="0" width="170" height="2" fill="#2a2c30"/>
    <!-- Inner wall lines (matching duct style) -->
    <line x1="4" y1="5" x2="4" y2="213" stroke="rgba(255,255,255,.025)" stroke-width="1"/>
    <line x1="166" y1="5" x2="166" y2="213" stroke="rgba(255,255,255,.025)" stroke-width="1"/>
    <line x1="4" y1="5" x2="166" y2="5" stroke="rgba(255,255,255,.015)" stroke-width="1"/>
    <line x1="4" y1="213" x2="166" y2="213" stroke="rgba(255,255,255,.015)" stroke-width="1"/>
    <!-- Doors -->
    <rect x="6" y="8" width="77" height="202" rx="1" fill="#121416" stroke="rgba(255,255,255,.03)" stroke-width="0.5"/>
    <rect x="87" y="8" width="77" height="202" rx="1" fill="#121416" stroke="rgba(255,255,255,.03)" stroke-width="0.5"/>
    <!-- Door seam -->
    <line x1="85" y1="10" x2="85" y2="208" stroke="rgba(255,255,255,.025)" stroke-width="1"/>
    <!-- Label plate (dark technical style) -->
    <rect x="22" y="40" width="126" height="34" rx="2" fill="#1a1c20" stroke="#333" stroke-width="1"/>
    <line x1="22" y1="40" x2="148" y2="40" stroke="rgba(255,255,255,.06)" stroke-width="0.5"/>
    <text x="85" y="57" text-anchor="middle" font-family="Outfit,sans-serif" font-size="13" font-weight="700" fill="rgba(255,255,255,.5)" letter-spacing="1.5">PRO<tspan fill="rgba(255,255,255,.5)">-</tspan>VENT</text>
    <text x="85" y="69" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="4.5" fill="#ffffff" letter-spacing="1.2">AUTOMATED PROBIOTIC FOGGING</text>
    <!-- Handle -->
    <circle cx="105" cy="115" r="7" fill="#1a1c20" stroke="#333" stroke-width="1"/>
    <circle cx="105" cy="115" r="3.5" fill="#151618" stroke="#2a2c30" stroke-width="0.5"/>
    <!-- Status indicator -->
    <circle cx="35" cy="95" r="2" fill="#fff" opacity=".6">
      <animate attributeName="opacity" values=".6;.15;.6" dur="3s" repeatCount="indefinite"/>
    </circle>
    <!-- Ventilation slots -->
    <line x1="30" y1="180" x2="60" y2="180" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="30" y1="185" x2="60" y2="185" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="30" y1="190" x2="60" y2="190" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <line x1="30" y1="195" x2="60" y2="195" stroke="rgba(255,255,255,.03)" stroke-width="1"/>
    <!-- Base -->
    <rect x="-2" y="216" width="174" height="6" rx="1" fill="#111111" stroke="#2a2c30" stroke-width="0.5"/>
    <!-- Pipe exit points -->
    <circle cx="170" cy="100" r="3" fill="#141618" stroke="#333" stroke-width="1"/>
    <circle cx="170" cy="130" r="3" fill="#141618" stroke="#333" stroke-width="1"/>
  </g>

  <!-- ═══ PIPES running UP from cabinet to nozzles ═══ -->
  <!-- Pipe to canopy nozzle -->
  <path d="M200 750 L260 750 L260 580 L323 580" 
        stroke="#333" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M200 748 L258 748 L258 578 L323 578" 
        stroke="rgba(255,255,255,.04)" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Pipe to duct nozzle (longer, goes all the way up) -->
  <path d="M200 765 L245 765 L245 365 L323 365" 
        stroke="#333" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M200 763 L243 763 L243 363 L323 363" 
        stroke="rgba(255,255,255,.04)" stroke-width="1" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- ═══ ANIMATED FOG FILLING DUCT (left to right) ═══ -->
  <clipPath id="pv_clipD1"><rect x="345" y="300" width="0" height="140"><animate attributeName="width" values="0;700;700;0" dur="8s" repeatCount="indefinite"/></rect></clipPath>
  <clipPath id="pv_clipD2"><rect x="345" y="300" width="0" height="140"><animate attributeName="width" values="0;650;650;0" dur="8s" begin="0.3s" repeatCount="indefinite"/></rect></clipPath>
  <clipPath id="pv_clipD3"><rect x="345" y="300" width="0" height="140"><animate attributeName="width" values="0;500;500;0" dur="8s" begin="0.5s" repeatCount="indefinite"/></rect></clipPath>
  <rect x="345" y="308" width="700" height="112" rx="2" fill="url(#pv_fogDuct)" opacity=".22" clip-path="url(#pv_clipD1)"/>
  <rect x="345" y="315" width="650" height="98" rx="2" fill="url(#pv_fogDuct2)" opacity=".17" clip-path="url(#pv_clipD2)"/>
  <rect x="345" y="322" width="500" height="84" rx="2" fill="url(#pv_fogDuct3)" opacity=".14" clip-path="url(#pv_clipD3)"/>

  <!-- ═══ ANIMATED FOG FILLING CANOPY (left to right, delayed) ═══ -->
  <clipPath id="pv_clipH1"><rect x="320" y="520" width="0" height="150"><animate attributeName="width" values="0;730;730;0" dur="8s" begin="1s" repeatCount="indefinite"/></rect></clipPath>
  <clipPath id="pv_clipH2"><rect x="340" y="520" width="0" height="150"><animate attributeName="width" values="0;690;690;0" dur="8s" begin="1.3s" repeatCount="indefinite"/></rect></clipPath>
  <clipPath id="pv_clipH3"><rect x="360" y="520" width="0" height="150"><animate attributeName="width" values="0;400;400;0" dur="8s" begin="1.5s" repeatCount="indefinite"/></rect></clipPath>
  <path d="M340 652 L340 585 L396 528 L972 528 L1040 585 L1040 652 Z" fill="url(#pv_fogHood)" opacity=".2" clip-path="url(#pv_clipH1)"/>
  <path d="M355 650 L355 590 L402 538 L960 538 L1025 590 L1025 650 Z" fill="url(#pv_fogHood2)" opacity=".15" clip-path="url(#pv_clipH2)"/>
  <path d="M370 648 L370 595 L410 545 L750 545 L750 648 Z" fill="url(#pv_fogHood3)" opacity=".12" clip-path="url(#pv_clipH3)"/>

  <!-- ═══ ANIMATED FOG IN SPIGOTS (rise up, staggered) ═══ -->
  <rect x="466" y="432" width="43" height="90" rx="2" fill="url(#pv_fogSpig)" opacity="0">
    <animate attributeName="opacity" values="0;.14;.14;0" dur="8s" begin="2s" repeatCount="indefinite"/>
  </rect>
  <rect x="676" y="432" width="43" height="90" rx="2" fill="url(#pv_fogSpig)" opacity="0">
    <animate attributeName="opacity" values="0;.1;.1;0" dur="8s" begin="3s" repeatCount="indefinite"/>
  </rect>
  <rect x="886" y="432" width="43" height="90" rx="2" fill="url(#pv_fogSpig)" opacity="0">
    <animate attributeName="opacity" values="0;.07;.07;0" dur="8s" begin="4s" repeatCount="indefinite"/>
  </rect>

  <!-- ═══ SUBTLE PARTICLES ═══ -->
  <circle cx="550" cy="360" r="1.5" fill="rgba(255,255,255,.05)">
    <animate attributeName="cx" values="380;1000;380" dur="9s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="380" r="1.2" fill="rgba(255,255,255,.04)">
    <animate attributeName="cx" values="400;980;400" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="600" r="1.5" fill="rgba(255,255,255,.04)">
    <animate attributeName="cx" values="380;1000;380" dur="10s" repeatCount="indefinite"/>
  </circle>
  <circle cx="700" cy="630" r="1.2" fill="rgba(255,255,255,.03)">
    <animate attributeName="cx" values="400;980;400" dur="11s" repeatCount="indefinite"/>
  </circle>
  <circle cx="487" cy="470" r="1" fill="rgba(255,255,255,.03)">
    <animate attributeName="cy" values="520;340;520" dur="6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="697" cy="480" r="1" fill="rgba(255,255,255,.025)">
    <animate attributeName="cy" values="525;345;525" dur="7s" repeatCount="indefinite"/>
  </circle>

  <!-- ═══ BRANDING ═══ -->
  <text x="600" y="1090" text-anchor="middle" font-family="Outfit,sans-serif" font-size="100" fill="rgba(255,255,255,.65)" letter-spacing="12" font-weight="700">PRO-VENT</text>
  <text x="600" y="1140" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="22" fill="#ffffff" letter-spacing="5">AUTOMATED PROBIOTIC FOGGING</text>

  <!-- ═══ DEFS ═══ -->
  <defs>
    <linearGradient id="pv_floorG" x1="600" y1="920" x2="600" y2="1200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="pv_fogDuct" x1="345" y1="365" x2="1045" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".5"/>
      <stop offset="85%" stop-color="#fff" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pv_fogDuct2" x1="345" y1="365" x2="995" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pv_fogDuct3" x1="345" y1="365" x2="845" y2="365" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pv_fogHood" x1="340" y1="605" x2="1040" y2="605" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".45"/>
      <stop offset="85%" stop-color="#fff" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pv_fogHood2" x1="355" y1="605" x2="1025" y2="605" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pv_fogHood3" x1="370" y1="605" x2="750" y2="605" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pv_fogSpig" x1="487" y1="367" x2="487" y2="432" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
